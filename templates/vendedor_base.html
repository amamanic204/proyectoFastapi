{% extends "base.html" %}

{% block header %}
<div class="izquierda">
    <div style="width:70px;">{{ macros.logo() }}</div>
</div>
<div class="centro">
    {{ macros.barraDeBusquedaVendedor() }}
</div>
<div class="derecha">
</div>
<style>
    header {
        width: 100%;
        padding: 20px 10px;
        background: none;
        display: grid;
        grid-template-columns: 3fr 6fr 3fr;
    }
    .izquierda {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .centro {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .derecha {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
</style>
{% endblock header %}

{% block content %}
<div class="layout">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <div class="sidebar-seccion">Cuenta</div>
            <a href="{{ url_for('vendedor_negocio', vendedor_id=vendedor_id) }}" class="nav-item">Mi Negocio</a>
            <a href="{{ url_for('vendedor_datos', vendedor_id=vendedor_id) }}" class="nav-item">Mis Datos</a>
            <a href="{{ url_for('vendedor_salir', vendedor_id=vendedor_id) }}" class="nav-item">Cerrar Cesion</a>
            <div class="sidebar-seccion">Productos</div>
            <a href="{{ url_for('vendedor_gestionar_productos', vendedor_id=vendedor_id) }}" class="nav-item">Gestionar</a>
            <a href="{{ url_for('vendedor_registrar_productos', vendedor_id=vendedor_id) }}" class="nav-item">Registrar</a>
        </nav>
    </aside>

    <main class="contenido">    
        {% block principal %}
        {% endblock %}
    </main>
</div>

<style>
    .layout {
        width: 90%;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 160px 1fr;
        margin: 0 auto;
    }

    .sidebar {
        border-right: 1px solid #ddd;
        background: var(--color-blanco);
        padding: 12px 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .sidebar-seccion {
        padding: 12px 16px 4px;
        font-size: 12px;
        color: var(--color-gris);
    }
    .sidebar-nav {
        display: flex;
        flex-direction: column;
    }
    .nav-item {
        padding: 6px 16px;
        font-size: 13px;
        color: var(--color-oscuro);
        text-decoration: none;
        transition: background-color 0.15s;
    }
    .nav-item:hover {
        background-color: #ebebeb;
    }
    .nav-item.activo {
        background-color: #d4d4d4;
        font-weight: bold;
    }
    .nav-item.visibilidad a {
        color: var(--color-oscuro);
        text-decoration: none;
    }

    .contenido {
        padding: 24px 28px;
        background: var(--color-humo-blanco);
    }
    
</style>
{% endblock %}
