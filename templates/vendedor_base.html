{% extends "base.html" %}

{% block header %}
<div class="izquierda">
    <div style="width:70px;">{{ macros.logo() }}</div>
</div>
<div class="centro">
    {{ macros.barraDeBusquedaVendedor() }}
</div>
<div class="derecha">
</div>
<style>
    header {
        width: 100%;
        padding: 20px 10px;
        background: none;
        display: grid;
        grid-template-columns: 3fr 6fr 3fr;
    }
    .izquierda {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .centro {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
    .derecha {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
    }
</style>
{% endblock header %}

{% block content %}
<div class="layout">
    <aside class="sidebar">
        <nav class="sidebar-nav">
            <div class="sidebar-seccion">Cuenta</div>
            <a href="{{ url_for('vendedor_negocio', vendedor_id=vendedor_id) }}" class="nav-item">Mi Negocio</a>
            <a href="{{ url_for('vendedor_datos', vendedor_id=vendedor_id) }}" class="nav-item">Mis Datos</a>
            <a href="{{ url_for('vendedor_salir', vendedor_id=vendedor_id) }}" class="nav-item">Cerrar Cesion</a>
            <div class="sidebar-seccion">Productos</div>
            <a href="{{ url_for('vendedor_gestionar_productos', vendedor_id=vendedor_id) }}" class="nav-item">Gestionar</a>
            <a href="{{ url_for('vendedor_registrar_productos', vendedor_id=vendedor_id) }}" class="nav-item">Registrar</a>
        </nav>
    </aside>

    <main class="contenido">
        {% block principal %}
        {% endblock %}
    </main>
</div>

<style>
    .layout {
        width: 90%;
        min-height: 100vh;
        display: grid;
        grid-template-columns: 160px 1fr;
        margin: 0 auto;
    }

    .sidebar {
        border-right: 1px solid #ddd;
        background: var(--color-blanco);
        padding: 12px 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .sidebar-seccion {
        padding: 12px 16px 4px;
        font-size: 12px;
        color: var(--color-gris);
    }
    .sidebar-nav {
        display: flex;
        flex-direction: column;
    }
    .nav-item {
        padding: 6px 16px;
        font-size: 13px;
        color: var(--color-oscuro);
        text-decoration: none;
        transition: background-color 0.15s;
    }
    .nav-item:hover {
        background-color: #ebebeb;
    }
    .nav-item.activo {
        background-color: #d4d4d4;
        font-weight: bold;
    }
    .nav-item.visibilidad a {
        color: var(--color-oscuro);
        text-decoration: none;
    }

    .contenido {
        padding: 24px 28px;
        background: var(--color-humo-blanco);
    }
    .fila-titulo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 4px;
    }
    .titulo {
        font-size: 50px;        
        font-weight: bold;
        color: var(--color-negro);
        margin: 0;
    }
    .ubicacion {
        font-size: 20px;
        color: var(--color-oscuro);
        margin: 0;
    }
    .separador {
        border: none;
        border-top: 1px dashed #aaa;
        margin: 6px 0 12px;
    }
    .btn-editar {
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        color: var(--color-oscuro);
        display: flex;
        align-items: center;
        border-radius: 4px;
    }
    .btn-editar:hover {
        background: #e0e0e0;
    }

    .bloque-negocio {
        display: grid;
        grid-template-columns: 2fr 3fr;
        border: 1px solid #ccc;
        border-radius: 4px;
        overflow: hidden;
        background: var(--color-blanco);
    }
    .imagen-negocio {
        position: relative;
        min-height: 140px;
        max-height: 300px;
    }
    .imagen-negocio img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .btn-imagen {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(255,255,255,0.85);
        border: 1px solid #ccc;
        border-radius: 6px;
        padding: 5px 7px;
        cursor: pointer;
        display: flex;
        align-items: center;
    }
    .btn-imagen:hover {
        background: white;
    }
    /* .info-negocio {
        padding: 20px 50px;
        font-size: 13px;
        color: var(--color-oscuro);
        display: flex;
        flex-direction: column;
        gap: 3px;
        position: relative;
    }
    .info-negocio p {
        margin: 0;
        line-height: 1.5;
    }
    .info-negocio a {
        color: #185fa5;
    } */
    .descripcion {
        margin-top: 6px !important;
        color: var(--color-gris);
        font-size: 14px;
        line-height: 1.6 !important;
    }
    .fila-editar-info {
        display: flex;
        justify-content: flex-end;
        margin-top: auto;
        padding-top: 8px;
    }

    .productos-header {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        margin-top: 20px;
        margin-bottom: 10px;
    }
    .productos-titulo {
        font-size: 25px;
        font-weight: bold;
        color: var(--color-negro);
    }
    .productos-acciones {
        display: flex;
        gap: 8px;
    }
    .btn-registrar {
        padding: 5px 12px;
        border: 1px solid var(--color-negro);
        border-radius: 6px;
        background: var(--color-blanco);
        color: var(--color-negro);
        text-decoration: none;
        font-size: 13px;
    }
    .btn-adicionar {
        padding: 5px 12px;
        border: none;
        border-radius: 6px;
        background: var(--color-negro);
        color: var(--color-blanco);
        text-decoration: none;
        font-size: 13px;
    }
    .productos-lista {
        display: flex;
        flex-direction: column;
    }
</style>
{% endblock %}
