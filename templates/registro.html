{% extends "base.html" %}

{% block header %}
<div class="header-logo">
    <div style="width:70px;">{{ macros.logo() }}</div>
</div>
<style>
    header {
        width: 100%;
        padding: 10px 16px;
        border-bottom: 1px solid #ddd;
        background: var(--color-blanco);
    }
    .header-logo {
        width: 80px;
    }
</style>
{% endblock header %}

{% block content %}
<div class="cuerpo-registro">
    <div class="registro-card">
        <h2 class="registro-titulo">Crear cuenta</h2>

        <form action="">
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Juan">
            </div>
            <div class="campo">
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Pérez">
            </div>
            <div class="campo">
                <label for="correo">Email:</label>
                <input type="text" id="correo" name="correo" placeholder="xxxx@xxxx.com">
            </div>
            <div class="campo">
                <label for="celular">Nro cel:</label>
                <input type="text" id="celular" name="celular" placeholder="7xxxxxxx">
            </div>
            <div class="campo">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena">
            </div>
            <div class="campo">
                <label for="repetir">Repetir contraseña:</label>
                <input type="password" id="repetir" name="repetir">
            </div>
            <button type="submit" class="btn-registrar">Registrarse</button>
            <p class="registro-pie">Ya tienes una cuenta? <a href="{{ url_for('acceso') }}">Iniciar sesion</a></p>
        </form>
    </div>
</div>

<style>
    .cuerpo {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        min-height: 80vh;
        background: var(--color-blanco);
    }
    .registro-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid #ccc;
        border-radius: 16px;
        padding: 36px 48px;
        background: var(--color-blanco);
        min-width: 360px;
    }
    .registro-titulo {
        font-size: 16px;
        font-weight: bold;
        color: var(--color-negro);
        margin-bottom: 24px;
    }
    .registro-card form {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }
    .campo {
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
    }
    .campo label {
        font-size: 13px;
        color: var(--color-oscuro);
        white-space: nowrap;
    }
    .campo input {
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        width: 200px;
        outline: none;
    }
    .campo input:focus {
        border-color: var(--color-negro);
    }
    .btn-registrar {
        margin-top: 8px;
        padding: 8px 28px;
        background: var(--color-negro);
        color: var(--color-blanco);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
    }
    .btn-registrar:hover {
        background: var(--color-oscuro);
    }
    .registro-pie {
        font-size: 13px;
        color: var(--color-oscuro);
        margin-top: 4px;
    }
    .registro-pie a {
        color: var(--color-negro);
    }
</style>
{% endblock %}
