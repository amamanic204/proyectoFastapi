{% extends "base.html" %}

{% block header %}
<div class="boton"><a href="{{ url_for('index') }}">Atras</a></div>

<style>
    header {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: left;
    }
</style>
{% endblock header %}

{% block content %}
    <form action="">
        <h3>Registro</h3>
        <label for="nombre">Nombre: </label>
        <input type="text" placeholder="nombre">
        <label for="apellidos">Apellidos: </label>
        <input type="text" placeholder="apellidos">
        <label for="email">Correo: </label>
        <input type="email" placeholder="email">
        <label for="password">Contraseña: </label>
        <input type="password" placeholder="contrasenia">
        <label for="password repeat">Repetir contraseña: </label>
        <input type="password" placeholder="repetir contrasenia">
        <input type="submit" value="registrarse">
        <p>Ya tienes una cuenta? <a href="">acceder</a>.</p>
    </form>
    <style>
        /* Fondo */
    body {
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Formulario */
    form {
        background-color: #ffffff;
        padding: 10px 20px;
        border-radius: 12px;
        border: 2px solid black;
        width: 380px;
    }
    form h3 {
        text-align: center;
        margin-bottom: 10px;
        padding-top:0;
        margin-top:10;
    }
    /* Labels */
    form label {
        display: inline-block;
        width: 170px; /* más ancho por textos largos */
        margin-bottom: 10px;
        text-align: end;
    }

    /* Inputs */
    form input[type="text"],
    form input[type="email"],
    form input[type="password"] {
        width: 200px;
        padding: 6px;
        border: 1px solid black;
        border-radius: 6px;
        margin-bottom: 10px;
        display: inline-block;
    }

    /* Botón */
    form input[type="submit"] {
        display: block;
        margin: 20px auto;
        padding: 10px;
        width: 60%;
        background-color: black;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    form input[type="submit"]:hover {
        background-color: #333;
    }

    /* Texto */
    form p {
        text-align: center;
        font-size: 14px;
        margin: 10px 0;
    }

    /* Links */
    form a {
        color: black;
        text-decoration: underline;
    }
    </style>
{% endblock %}
