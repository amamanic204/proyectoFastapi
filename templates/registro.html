{% extends "base.html" %}

{% block header %}

{% endblock header %}

{% block content %}
<div class="cuerpo-registro">
    <div class="registro-card">
        <h2 class="registro-titulo">Crear cuenta</h2>
        <form method="post" action="{{ url_for('registro') }}" id="formRegistro">
            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="vendedor_nombre" pattern="[a-zA-Z ñÑáÁéÉíÍóÓúÚüÜ]{1,}" required>
            </div>
            <div class="campo">
                <label for="apellidos">Apellidos:</label>
                <input type="text" id="apellidos" name="vendedor_apellido" pattern="[a-zA-Z ñÑáÁéÉíÍóÓúÚüÜ]{1,}" required>
            </div>
            <div class="campo">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" name="vendedor_correo" placeholder="xxxx@xxxx.com">
            </div>
            <div class="campo">
                <label for="celular">Nro cel:</label>
                <input type="tel" id="celular" name="vendedor_celular" placeholder="xxxxxxxx" pattern="[67][0-9]{7}" required>
            </div>
            <div class="campo">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="vendedor_contrasena" pattern="[0-9a-zA-Z]{8}" required>
            </div>
            <div class="campo">
                <label for="repetir">Repetir contraseña:</label>
                <input type="password" id="repetir" name="repetir" pattern="[0-9a-zA-Z]{8}" required>
            </div>
            <button class="btn-registrar" id="btnRegistrar">Registrarse</button>
            <p class="registro-pie">Ya tienes una cuenta? <a href="{{ url_for('acceso') }}">Iniciar sesion</a></p>
        </form>
        <a class="cancelar" href="{{ url_for('index') }}">X</a>
    </div>
</div>
<style>
    .cuerpo-registro {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        width: 100%;
        background: var(--color-blanco);
    }
    .registro-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid #ccc;
        border-radius: 16px;
        padding: 18px 24px;
        background: var(--color-blanco);
        min-width: 360px;
        max-width: 50%;
        position: relative;
    }
    .registro-titulo {
        font-size: 16px;
        font-weight: bold;
        color: var(--color-negro);
        margin-bottom: 10px;
    }
    .registro-card form {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }
    .campo {
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
    }
    .campo label {
        font-size: 13px;
        color: var(--color-oscuro);
        white-space: nowrap;
    }
    .campo input {
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        width: 200px;
        outline: none;
    }
    .campo input:focus {
        border-color: var(--color-negro);
    }
    .btn-registrar {
        margin-top: 8px;
        padding: 8px 28px;
        background: var(--color-negro);
        color: var(--color-blanco);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
    }
    .btn-registrar:hover {
        background: var(--color-oscuro);
    }
    .registro-pie {
        font-size: 13px;
        color: var(--color-oscuro);
        margin-top: 4px;
    }
    .registro-pie a {
        color: var(--color-negro);
    }
    .cancelar {
        position: absolute;
        top: 0;
        right: 0;
        margin: 10px;
        /* margin: 4px; */
        text-decoration: none;
        padding: 4px;
        border-radius: 6px;
    }
    .cancelar:hover {
        background-color: #ccc;
    }
</style>
{% endblock %}
