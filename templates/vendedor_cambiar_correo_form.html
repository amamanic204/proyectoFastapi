{% extends "base.html" %}

{% block header %}

{% endblock header %}

{% block content %}
    
    <div class="acceso-cuerpo">
    <div class="acceso-card">
        <h3>Combio de CORREO</h3>

        <form method="post" action="{{ url_for('vendedor_cambiar_contrasena', vendedor_id=vendedor_id) }}">
        
        <label for="contrasena_antigua">NUEVO CORREO: </label>
        <input type="text" id="contrasena_antigua" name="contrasena_antigua">
        <label for="contrasena_nueva">Contraseña: </label>
        <input type="text" id="contrasena_nueva" name="contrasena_nueva">
        <button>Cambiar Contraseña</button>
    </form>
        <a class="cancelar" href="{{ url_for('vendedor_datos', vendedor_id=vendedor_id) }}">X</a>
    </div>
</div>

<style>
    .cuerpo {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--color-blanco);
    }
    .acceso-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        border: 1px solid #ccc;
        border-radius: 16px;
        padding: 36px 48px;
        background: var(--color-blanco);
        min-width: 340px;
        position: relative;
    }
    .acceso-titulo {
        font-size: 16px;
        font-weight: bold;
        color: var(--color-negro);
        margin-bottom: 24px;
    }
    .acceso-card form {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
    }
    .campo {
        width: 100%;
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
    }
    .campo label {
        font-size: 13px;
        color: var(--color-oscuro);
        white-space: nowrap;
    }
    .campo input {
        border: 1px solid #bbb;
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 13px;
        width: 200px;
        outline: none;
    }
    .campo input:focus {
        border-color: var(--color-negro);
    }
    .btn-acceder {
        margin-top: 8px;
        padding: 8px 28px;
        background: var(--color-negro);
        color: var(--color-blanco);
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
    }
    .btn-acceder:hover {
        background: var(--color-oscuro);
    }
    .acceso-pie {
        font-size: 13px;
        color: var(--color-oscuro);
        margin-top: 4px;
    }
    .acceso-pie a {
        color: var(--color-negro);
    }
    .cancelar {
        position: absolute;
        top: 0;
        right: 0;
        margin: 10px;
        /* margin: 4px; */
        text-decoration: none;
        padding: 4px;
        border-radius: 6px;
    }
    .cancelar:hover {
        background-color: #ccc;
    }
</style>
{% endblock %}
