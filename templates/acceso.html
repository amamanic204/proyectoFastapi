{% extends "base.html" %}

{% block header %}
<div class="boton"><a href="{{ url_for('index') }}">Atras</a></div>

<style>
    header {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: left;
    }
</style>
{% endblock header %}

{% block content %}
    <form action="{{ url_for('vendedor_negocio') }}">
        <h3>Iniciar Sesion</h3>
        <label for="email">Correo electrónico: </label>
        <input type="email" id="email" name="correo">
        <label for="password">Contraseña: </label>
        <input type="password">
        <input type="submit" value="acceder">
        <p>Ovlidaste tu contraseña? <a href="#">Cambiar contraseña</a>.</p>
        <p>No tienes una cuenta? <a href="{{ url_for('registro') }}">registrate</a>.</p>
    </form>
    <style>
        /* Fondo */
        body {
            font-family: Arial, sans-serif;
            background-color: #fffdfd;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Formulario */
    form {
        background-color: #ffffff;
        padding: 10px 20px;
        border-radius: 12px;
        border: 2px solid black;
        width: 350px;
    }
    form h3 {
        text-align: center;
        margin-bottom: 10px;
        padding-top:0;
        margin-top:10;
    }

    /* Labels */
    form label {
        display: inline-block;
        width: 140px; /* espacio fijo para alinear */
        margin-bottom: 10px;
        font-weight: 500;
    }

    /* Inputs */
    form input[type="email"],
    form input[type="password"] {
        width: 200px;
        padding: 6px;
        border: 1px solid black;
        border-radius: 6px;
        margin-bottom: 10px;
    }

    /* Salto ordenado entre grupos */
    form input[type="email"],
    form input[type="password"] {
        display: inline-block;
    }

    /* Botón */
    form input[type="submit"] {
        display: block;
        margin: 15px auto;
        padding: 10px;
        width: 60%;
        background-color: black;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }

    form input[type="submit"]:hover {
        background-color: #333;
    }

    /* Textos */
    form p {
        text-align: center;
        font-size: 14px;
        margin: 8px 0;
    }

    /* Links */
    form a {
        color: black;
        text-decoration: underline;
    }
    </style>
{% endblock %}
