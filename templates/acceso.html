{% extends "base.html" %}

{% block header %}
<div class="boton"><a href="{{ url_for('index') }}">Atras</a></div>

<style>
    header {
        width: 100%;
        display: flex;
        flex-direction: row;
        justify-content: left;
    }
</style>
{% endblock header %}

{% block content %}
    <form action="{{ url_for('vendedor_negocio') }}">
        <label for="email">Correo electrónico: </label>
        <input type="email" id="email" name="correo">
        <input type="password">
        <input type="submit" value="acceder">
        <p>Ovlidaste tu contrasenia? <a href="#">Cambiar contrasenia</a>.</p>
        <p>No tienes una cuenta? <a href="{{ url_for('registro') }}">registrate</a>.</p>
    </form>
    <style>
        .cuerpo {
            display: flex;
            flex-direction: row;
            justify-content: space-evenly;
            align-items: center;
        }
        form {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
{% endblock %}
